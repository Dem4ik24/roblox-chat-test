<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Private Chat Room</title>
  <style>
    body { background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    h2 { text-align: center; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; }
    button { width: 100%; padding: 12px; background: #6200ea; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #3700b3; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Secure Chat Portal</h2>
    <form id="chatForm" action="https://formspree.io/f/mlgyzlpw" method="POST">
      <input type="text" name="User" placeholder="Your Nickname" required />
      <input type="text" name="Content" placeholder="Enter message..." required />
      <button type="submit">Send Message</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('chatForm');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } })
        .then(() => { form.reset(); alert('Message Sent!'); });
    });
  </script>
</body>
</html>
